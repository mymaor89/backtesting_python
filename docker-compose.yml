  # ──────────────────────────────────────────────
  # GO PROXY
  # Security layer between React frontend and Python API.
  # Strips /api prefix and forwards to ft-api:8000.
  # React dev server proxies /api/* → here.
  # ──────────────────────────────────────────────
  go-proxy:
    build:
      context: ./go-proxy
      dockerfile: Dockerfile
    container_name: ft-go-proxy
    restart: unless-stopped
    environment:
      - PYTHON_API_URL=http://ft-api:8000
    ports:
      - "9000:9000"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ft-net

  # ──────────────────────────────────────────────
  # STRATEGY LAB  (React + Vite dev server)
  # Vite proxies /api/* → go-proxy:9000 (never hits Python directly).
  # For production: npm run build → copy dist/ into Go binary via embed.
  # ──────────────────────────────────────────────
  strategy-lab:
    build:
      context: ./strategy-lab
      dockerfile: Dockerfile
    container_name: ft-strategy-lab
    restart: unless-stopped
    environment:
      - VITE_API_PROXY_TARGET=http://go-proxy:9000
    ports:
      - "5173:5173"
    depends_on:
      - go-proxy
    volumes:
      - ./strategy-lab/src:/app/src   # hot-reload without full image rebuild
    networks:
      - ft-net

  # ──────────────────────────────────────────────
  # CLI — only starts with: docker compose run cli
  # Full shell access to all tools + same data volumes
  # ──────────────────────────────────────────────
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft-cli
    environment:
      - ARCHIVE_PATH=/data/lake/bronze
      - DATABASE_URL=postgresql://fasttrade:${DB_PASSWORD:-fasttrade_dev}@timescaledb:5432/fasttrade
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    volumes:
      - lake_data:/data/lake
      - results_data:/data/results
      - models_data:/data/models
      - ./fast_trade:/app/fast_trade
    working_dir: /data
    entrypoint: ["bash"]
    stdin_open: true
    tty: true
    profiles:
      - cli
    networks:
      - ft-net

# ──────────────────────────────────────────────
# NETWORKS
# ──────────────────────────────────────────────
networks:
  ft-net:
    driver: bridge

# ──────────────────────────────────────────────
# VOLUMES
# All persistent data survives container restarts/rebuilds
#
# lake_data     - Raw + silver market data (the data lake)
# timescaledb   - Primary time-series database
# redis_data    - Event bus persistence
# notebooks     - JupyterLab notebooks
# results_data  - Backtest run artifacts
# models_data   - ML model artifacts
# prometheus    - Metrics history
# grafana       - Dashboard state
# ──────────────────────────────────────────────
volumes:
  timescaledb_data:
  redis_data:
  lake_data:
  results_data:
  models_data:
#  notebooks_data:
#  grafana_data:
