strategy:
  freq: "#freq"
  symbol: BTCUSDT
  exchange: binanceus
  start: 2024-11-01
  stop: 2025-01-01
  any_enter:
    -
      - rsi
      - "<"
      - "#rsi_lower"
  any_exit:
    -
      - rsi
      - ">"
      - "#rsi_upper"
  datapoints:
    -
      name: sma_fast
      transformer: zlema
      args:
        - "#fast_period"
    -
      name: sma_slow
      transformer: zlema
      args:
        - "#slow_period"
    -
      name: rsi
      transformer: rsi
      args:
        - "#rsi_period"
  enter:
    -
      - sma_fast
      - ">"
      - sma_slow
  exit:
    -
      - sma_fast
      - "<"
      - sma_slow
  base_balance: 1000.0
  exit_on_end: false
  comission: 0.0
  trailing_stop_loss: 0.0
  lot_size_perc: 1.0
  max_lot_size: 0.0
  rules: null
genes:
  -
    name: freq
    space:
      low: 0
      high: 7
  -
    name: fast_period
    space:
      low: 2
      high: 40
  -
    name: slow_period
    space:
      low: 30
      high: 300
  -
    name: rsi_period
    space:
      low: 2
      high: 30
  -
    name: rsi_lower
    space:
      low: 5
      high: 45
  -
    name: rsi_upper
    space:
      low: 55
      high: 95
settings:
  num_generations: 200
  num_parents_mating: 12
  sol_per_pop: 40
  mutation_type: adaptive
  mutation_percent_genes:
    - 50
    - 10
  crossover_type: uniform
  parent_selection_type: tournament
  K_tournament: 6
  parallel_processing:
    - thread
    - 6
fitness:
  weights:
    return_perc: 0.7
    market_adjusted_return: 0.2
    sharpe_ratio: 0.05
    drawdown_metrics.max_drawdown_pct: -0.05
    num_trades: 0.1
  min_trades: 10
  low_trades_penalty: -10.0
fitness_presets:
  aggressive:
    weights:
      return_perc: 0.5
      market_adjusted_return: 0.3
      sharpe_ratio: 0.1
      drawdown_metrics.max_drawdown_pct: -0.2
      num_trades: 0.1
    min_trades: 5
    low_trades_penalty: -1.0
  conservative:
    weights:
      return_perc: 0.2
      market_adjusted_return: 0.2
      sharpe_ratio: 0.3
      drawdown_metrics.max_drawdown_pct: -0.4
      num_trades: 0.1
      risk_metrics.sortino_ratio: 0.2
    min_trades: 5
    low_trades_penalty: -5.0
