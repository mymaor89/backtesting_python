# ============================================================
# Fast-Trade Professional Trading Research Environment
# Phase 2 Architecture
#
# Services:
#   timescaledb   - Source of truth (time-series PostgreSQL)
#   redis         - Event bus + job queue + cache
#   data-ingestor - Async market data fetcher (yfinance, Binance, Coinbase)
#   backtest      - Celery worker: runs backtests + optimizations
#   api-gateway   - FastAPI strategy engine
#   go-proxy      - Security & routing
#   strategy-lab  - React frontend
#   cli           - Interactive shell environment
#
# Profiles:
#   (default)     - core infra + api + frontend
#   cli           - interactive shell with full tooling
# ============================================================

services:

  # ──────────────────────────────────────────────
  # SOURCE OF TRUTH
  # ──────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ft-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: fasttrade
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fasttrade_dev}
      POSTGRES_DB: fasttrade
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fasttrade -d fasttrade"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ft-net

  # ──────────────────────────────────────────────
  # EVENT BUS + CACHE + JOB QUEUE
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ft-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ft-net

  # ──────────────────────────────────────────────
  # STRATEGY ENGINE API  (FastAPI)
  # The Go backend and React frontend talk to this.
  # POST /backtest   — synchronous backtest run
  # POST /optimize   — async GA optimisation
  # GET  /health     — liveness probe
  # ──────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft-api
    restart: unless-stopped
    # Default CMD in Dockerfile already runs uvicorn; listed here for clarity
    command: ["uvicorn", "fast_trade.services.api:app",
              "--host", "0.0.0.0", "--port", "8000",
              "--workers", "2", "--log-level", "info"]
    environment:
      - DATABASE_URL=postgresql://fasttrade:${DB_PASSWORD:-fasttrade_dev}@timescaledb:5432/fasttrade
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ARCHIVE_PATH=/data/lake/bronze
      - PYTHONUNBUFFERED=1
    volumes:
      - lake_data:/data/lake
      - results_data:/data/results
      - ./fast_trade:/app/fast_trade   # live-reload during dev
      - ./test:/app/test               # tests
      - ./pyproject.toml:/app/pyproject.toml
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ft-net

  # ──────────────────────────────────────────────
  # DATA INGESTION LAYER
  # Fetches from yfinance / Binance / Coinbase
  # Normalizes and writes to TimescaleDB + bronze lake
  # ──────────────────────────────────────────────
  data-ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft-ingestor
    restart: unless-stopped
    command: ["python", "-m", "fast_trade.services.ingestor"]
    # Pass symbols as: "EXCHANGE:SYMBOL:YF_TICKER:INTERVAL,..."
    # Example: INGEST_SYMBOLS=yfinance:BTCUSD:BTC-USD:1h,yfinance:SPY:SPY:1d
    environment:
      - ARCHIVE_PATH=/data/lake/bronze
      - DATABASE_URL=postgresql://fasttrade:${DB_PASSWORD:-fasttrade_dev}@timescaledb:5432/fasttrade
      - REDIS_URL=redis://redis:6379/0
      - INGESTOR_POLL_INTERVAL=300
      # - INGEST_SYMBOLS=yfinance:BTCUSD:BTC-USD:1h,yfinance:SPY:SPY:1d
      - PYTHONUNBUFFERED=1
    volumes:
      - lake_data:/data/lake
      - ./fast_trade:/app/fast_trade   # live-reload during dev
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ft-net

  # ──────────────────────────────────────────────
  # BACKTEST WORKER
  # Celery worker: runs backtests and GA optimization
  # Reads data from TimescaleDB, writes results back
  # ──────────────────────────────────────────────
  backtest-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ft-backtest-worker
    restart: unless-stopped
    command: ["celery", "-A", "fast_trade.tasks", "worker",
              "--loglevel=info", "--concurrency=2", "-Q", "backtests,optimize"]
    environment:
      - ARCHIVE_PATH=/data/lake/bronze
      - DATABASE_URL=postgresql://fasttrade:${DB_PASSWORD:-fasttrade_dev}@timescaledb:5432/fasttrade
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PYTHONUNBUFFERED=1
    volumes:
      - lake_data:/data/lake
      - results_data:/data/results
      - models_data:/data/models
      - ./fast_trade:/app/fast_trade
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ft-net

